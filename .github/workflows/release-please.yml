name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4

      - name: Compute image name
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          image="ghcr.io/${owner}/${repo}"

          echo "name=${image}" >> "$GITHUB_OUTPUT"

          # Docker/OCI name components cannot start or end with separators.
          if [[ "$owner" =~ ^[a-z0-9]+(([._]|__|[-]+)[a-z0-9]+)*$ ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Repository owner '${GITHUB_REPOSITORY_OWNER}' is not a valid OCI namespace for GHCR image publication." >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when image publication is skipped
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish != 'true' }}
        run: echo "::warning::${{ steps.image.outputs.skip_reason }}"

      - name: Set up QEMU
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push release image
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate build provenance attestation
        if: ${{ steps.release.outputs.release_created == 'true' && steps.image.outputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
