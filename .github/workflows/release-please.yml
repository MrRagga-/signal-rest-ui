name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute image name
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: image
        shell: bash
        run: echo "dockerhub=docker.io/mrragga/signal-rest-ui" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.image.outputs.dockerhub }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push release image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate release SBOM
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ steps.image.outputs.dockerhub }}@${{ steps.build.outputs.digest }}
          artifact-name: signal-rest-ui-${{ steps.release.outputs.tag_name }}.spdx.json
          output-file: ${{ runner.temp }}/signal-rest-ui-${{ steps.release.outputs.tag_name }}.spdx.json
          format: spdx-json
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          upload-release-assets: false

      - name: Upload SBOM to GitHub release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "${{ runner.temp }}/signal-rest-ui-${{ steps.release.outputs.tag_name }}.spdx.json" \
            --clobber

      - name: Generate Docker Hub build provenance attestation
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ steps.image.outputs.dockerhub }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
